env:
  robot: "franka"                  # franka | ur5
  control_freq: 20                 # Hz
  episode_steps: 500               # hard cap; Lissajous episodes end earlier (see lissajous_duration)
  max_delta_q: 0.08                # radians per step, action clip
  track_orientation: true

noise:
  ee_pos_std: 0.005                # meters
  ee_ori_std: 0.01                 # radians (applied to 6D repr)
  joint_pos_std: 0.005             # radians

trajectory:
  train_type: "lissajous"          # curve family for training: "lissajous" or "circle"
  eval_type: "lissajous"           # curve family for evaluation: "lissajous" or "circle"
  workspace_center: [0.4, 0.0, 0.4]
  workspace_radius: 0.25           # meters
  lissajous_duration: 10.0         # seconds per episode (one curve)
  ori_ramp_duration: 1.5           # seconds: startup ramp (orientation AND position) onto the curve
  train_amp_range: [0.3, 1.0]      # per-axis amplitude, as a fraction of workspace_radius
  train_freq_range: [0.5, 3.0]     # per-axis angular frequency, rad/s
  curve_center_offset: [-0.10, 0.0, -0.10]   # meters [dx, dy, dz], applied to all curves
  eval_amp_scale: 0.90                       # shrink the canonical eval curve to 90%
  circle_duration: 10.0            # seconds per episode (one curve)
  circle_radius: 0.15              # meters, circle radius (top-view)
  circle_height_amp: 0.08          # meters, vertical sine amplitude (crown undulation)
  circle_lobes: 3                  # up/down lobes per revolution (number of crown points)
  circle_loops: 1                  # revolutions per episode
  n_waypoints: 6
  interp_duration: 2.0

reward:
  beta: 0.03                       # smoothness penalty weight
  pos_scale: 0.05                  # m   — position reward exp scale (Run A; tighten to 0.05 for Run B)
  ori_scale: 0.5                   # rad — orientation reward exp scale

training:
  total_timesteps: 4_000_000
  n_envs: 8                        # parallel environments
  save_freq: 50_000
  log_interval: 1000
  log_dir: "logs/"
  model_dir: "models/"
