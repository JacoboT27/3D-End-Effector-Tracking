services:
  train:
    build: .
    image: ghcr.io/jacobot27/ee-tracking:latest
    volumes:
      - .:/workspace
    command: python -m agent.train --config configs/default.yaml
    environment:
      - MUJOCO_GL=osmesa
      - PYTHONPATH=/workspace
      - OMP_NUM_THREADS=1
      - PYTHONUNBUFFERED=1

  evaluate:
    build: .
    image: ghcr.io/jacobot27/ee-tracking:latest
    volumes:
      - .:/workspace
    command: python -m agent.evaluate --config configs/default.yaml --model models/best/best_model
    environment:
      - MUJOCO_GL=osmesa
      - PYTHONPATH=/workspace
    
  viewer:
    build: .
    image: ghcr.io/jacobot27/ee-tracking:latest
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=${DISPLAY}
      - MUJOCO_GL=glfw
      - PYTHONPATH=/workspace
    command: python -m agent.visualize --model models/best/best_model