services:
  train:
    build: .
    image: ghcr.io/jacobot27/ee-tracking:latest
    volumes:
      - ./assets:/workspace/assets
      - ./models:/workspace/models
      - ./logs:/workspace/logs
      - .:/workspace
    command: python -m agent.train --config configs/default.yaml
    environment:
      - MUJOCO_GL=osmesa
      - PYTHONPATH=/workspace
      - OMP_NUM_THREADS=1
      - PYTHONUNBUFFERED=1

  evaluate:
    build: .
    image: ghcr.io/jacobot27/ee-tracking:latest
    volumes:
      - ./assets:/workspace/assets
      - ./models:/workspace/models
      - ./logs:/workspace/logs
    command: python -m agent.evaluate --config configs/default.yaml --model models/best/best_model
    environment:
      - MUJOCO_GL=osmesa
      - PYTHONPATH=/workspace
    # For live rendering on Linux, uncomment:
    # environment:
    #   - DISPLAY=${DISPLAY}
    #   - MUJOCO_GL=glfw
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix